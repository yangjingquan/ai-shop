spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/shop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: shop
    password: changeme_shop
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6380
      password: changeme_redis
      timeout: 3s
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: false
    locations: classpath:db/migration

logging:
  level:
    com.shop: INFO
    org.flywaydb: INFO

shop:
  jwt:
    secret: test-shop-jwt-secret-please-change-in-prod-min-32-bytes
    admin-ttl-hours: 8
    merchant-ttl-hours: 8
    wx-ttl-days: 7
  wechat:
    appid: wx-test-placeholder
    secret: wx-test-secret-placeholder
  file:
    upload-dir: uploads
    public-prefix: /uploads
  cors:
    allowed-origin-patterns: '*'
  jobs:
    order-timeout-enabled: false
    auto-receive-enabled: false
