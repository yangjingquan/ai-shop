spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/shop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:shop}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 3s
  flyway:
    enabled: false

logging:
  level:
    root: INFO
    com.shop: INFO
  file:
    name: ${SHOP_LOG_FILE:/data/shop/logs/shop-wx-app.log}

knife4j:
  enabled: false

shop:
  file:
    upload-dir: ${SHOP_FILE_UPLOAD_DIR:/data/shop/uploads}
    public-prefix: ${SHOP_FILE_PUBLIC_PREFIX:/uploads}
  cors:
    allowed-origin-patterns: https://miniapi.nexbyte.top
